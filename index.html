<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asignaciones para las reuniones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #ffffff;
      --paper-2: #fbfaf7;
      --text: #1a1a1a;
      --muted: #6f6f6f;
      --line: rgba(0, 0, 0, 0.10);
      --line-soft: rgba(0, 0, 0, 0.06);

      --jw-beige: #efe0a1;
      --jw-beige-deep: #e5d28d;
      --jw-black: #111111;
      --jw-gray: #4b4b4b;
      --jw-gold: #c89b00;
      --jw-gold-soft: rgba(200, 155, 0, 0.14);
      --jw-red: #b30000;

      --badge-bg: #f7f7f7;
      --badge-border: rgba(0, 0, 0, 0.10);
      --detail-bg: #fcfcfb;
      --detail-border: rgba(0, 0, 0, 0.07);

      --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.05);
      --shadow-card: 0 6px 16px rgba(0, 0, 0, 0.04);

      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Noto Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(239, 224, 161, 0.22), transparent 150px),
        linear-gradient(180deg, #fbfaf6, var(--bg));
      color: var(--text);
      padding: 1.1rem;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 980px;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
      padding-top: 0.35rem;
    }

    header h1 {
      font-size: clamp(1.85rem, 4.8vw, 2.45rem);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 0.15rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.85rem;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 0.1rem;
    }

    .controls-left,
    .controls-right {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: center;
    }

    .select-wrapper {
      width: 100%;
      max-width: 260px;
    }

    .select-label {
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--jw-gray);
      margin-bottom: 0.34rem;
      font-weight: 800;
    }

    select {
      width: 100%;
      border-radius: 999px;
      padding: 0.56rem 0.95rem;
      border: 1px solid var(--badge-border);
      background: #fff;
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
      appearance: auto;
    }

    .toggle-btn {
      border-radius: 999px;
      border: 1px solid var(--badge-border);
      background: #fff;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 0.38rem 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: 0.16s ease;
      font-weight: 700;
    }

    .toggle-btn.active {
      border-color: rgba(75, 75, 75, 0.32);
      color: #111;
      background: #f5f5f5;
    }

    .toggle-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(107, 107, 107, 0.7);
    }

    .toggle-btn.active .toggle-dot {
      background: var(--jw-gold);
      box-shadow: 0 0 8px rgba(200, 155, 0, 0.35);
    }

    .view-tabs {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid var(--badge-border);
      background: #fff;
      overflow: hidden;
    }

    .view-tab {
      padding: 0.4rem 0.9rem;
      font-size: 0.79rem;
      color: var(--muted);
      border: none;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 700;
    }

    .view-tab.active {
      background: var(--jw-gray);
      color: #fff;
    }

    .card-shell {
      background: linear-gradient(180deg, #fffefb, #ffffff);
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .card-shell::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 18px;
      background: linear-gradient(90deg, var(--jw-beige), #cdbb79 45%, var(--jw-black));
    }

    .card-shell-inner {
      position: relative;
      z-index: 1;
      padding: 1.1rem 1rem 1rem;
      margin-top: 0.35rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.8rem;
      padding-top: 0.1rem;
    }

    .section-title h2 {
      font-size: 0.98rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--jw-gray);
      font-weight: 800;
    }

    .section-title span {
      font-size: 0.86rem;
      color: var(--jw-gray);
      padding: 0.26rem 0.92rem;
      border-radius: 999px;
      border: 1px solid var(--badge-border);
      background: #fff;
      white-space: nowrap;
      font-weight: 700;
    }

    .view-message {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      padding-left: 0.1rem;
    }

    .assignments-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.85rem;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      padding-right: 0.2rem;
    }

    .assignments-grid::-webkit-scrollbar {
      width: 6px;
    }

    .assignments-grid::-webkit-scrollbar-track {
      background: #ecebe7;
      border-radius: 999px;
    }

    .assignments-grid::-webkit-scrollbar-thumb {
      background: #c8c4bb;
      border-radius: 999px;
    }

    .separator {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--jw-gray);
      margin-top: 0.55rem;
      margin-bottom: -0.1rem;
      font-weight: 800;
      padding-left: 0.08rem;
      position: relative;
    }

    .separator::after {
      content: "";
      display: block;
      margin-top: 0.4rem;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(75,75,75,0.22), transparent);
    }

    .assignment-card {
      background: linear-gradient(180deg, #ffffff, #fcfcfa);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      padding: 0.9rem 0.9rem 0.85rem;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.95fr);
      gap: 0.65rem 0.95rem;
      box-shadow: var(--shadow-card);
    }

    .assignment-card.destacada {
      border-color: rgba(200, 155, 0, 0.38);
      background: linear-gradient(180deg, #fffef8, #ffffff);
      box-shadow:
        0 0 0 1px rgba(200,155,0,0.10),
        0 10px 24px rgba(0,0,0,0.05);
      position: relative;
    }

    .assignment-card.destacada::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--jw-gold), var(--jw-beige));
      border-radius: 14px 14px 0 0;
    }

    .assignment-date {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
    }

    .assignment-label {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-weight: 800;
    }

    .assignment-day {
      font-size: 1.08rem;
      font-weight: 800;
      color: #111;
      line-height: 1.2;
    }

    .assignment-day.church-day {
      color: var(--jw-gold);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.35rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      padding: 0.26rem 0.8rem;
      border-radius: 999px;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      font-size: 0.76rem;
      color: var(--muted);
      width: fit-content;
      font-weight: 700;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--jw-gray);
    }

    .badge-hoy {
      border-color: rgba(34, 197, 94, 0.30);
      color: #166534;
      background: rgba(34, 197, 94, 0.10);
    }

    .badge-hoy .badge-dot {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
    }

    .assignment-details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.45rem 0.7rem;
      font-size: 0.9rem;
    }

    .detail-group {
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
      background: var(--detail-bg);
      border: 1px solid var(--detail-border);
      border-radius: 10px;
      padding: 0.46rem 0.56rem;
    }

    .detail-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      position: relative;
      padding-left: 0.9rem;
      font-weight: 800;
      line-height: 1.15;
    }

    .detail-label::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
    }

    .detail-label.label-audio::before { background: #2c7fb8; }
    .detail-label.label-video::before { background: #7c5cc4; }
    .detail-label.label-mic::before { background: #3aa35c; }
    .detail-label.label-plataforma::before { background: var(--jw-gold); }
    .detail-label.label-entrada::before { background: #d97706; }
    .detail-label.label-auditorio::before { background: #c2415b; }

    .detail-value {
      font-size: 0.96rem;
      color: #1f1f1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      line-height: 1.25;
    }

    .empty-msg {
      font-size: 0.95rem;
      color: var(--muted);
      padding-top: 0.5rem;
    }

    body.modo-texto-grande .assignment-day { font-size: 1.22rem; }
    body.modo-texto-grande .detail-value { font-size: 1.04rem; }
    body.modo-texto-grande .detail-label { font-size: 0.78rem; }
    body.modo-texto-grande .assignment-card { padding: 1rem 0.95rem; }

    body.modo-alto-contraste {
      background: #ffffff;
    }

    body.modo-alto-contraste .card-shell,
    body.modo-alto-contraste .assignment-card,
    body.modo-alto-contraste .detail-group {
      border-color: rgba(0,0,0,0.20);
    }

    body.modo-alto-contraste .assignment-label,
    body.modo-alto-contraste .section-title h2,
    body.modo-alto-contraste .detail-label {
      color: #444;
    }

    @media (max-width: 900px) {
      body {
        padding: 0.9rem 0.65rem 1rem;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0.75rem 0.35rem 1rem;
      }

      header h1 {
        font-size: 1.62rem;
        line-height: 1.18;
      }

      .card-shell-inner {
        padding: 1rem 0.8rem 0.9rem;
      }

      .assignments-grid {
        max-height: none;
        overflow-y: visible;
        padding-right: 0;
      }

      .assignment-card {
        grid-template-columns: minmax(0, 1fr);
        padding: 0.9rem 0.82rem;
      }

      .assignment-details {
        grid-template-columns: minmax(0, 1fr);
        row-gap: 0.38rem;
      }

      .detail-label {
        font-size: 0.69rem;
      }

      .detail-value {
        font-size: 0.9rem;
      }

      .controls-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .controls-right {
        justify-content: flex-start;
      }

      .section-title {
        align-items: flex-start;
        flex-direction: column;
      }

      .section-title span {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1>Asignaciones para las reuniones</h1>
    </header>

    <section class="layout">
      <div class="controls-bar">
        <div class="controls-left">
          <div class="select-wrapper">
            <div class="select-label">Mes / año</div>
            <select id="monthYearSelect"></select>
          </div>
        </div>

        <div class="controls-right">
          <div class="view-tabs" aria-label="Ver">
            <button class="view-tab active" data-view="mes" id="tab-mes">Todo el mes</button>
            <button class="view-tab" data-view="semana" id="tab-semana">Esta semana</button>
            <button class="view-tab" data-view="hoy" id="tab-hoy">Hoy</button>
          </div>

          <button class="toggle-btn" id="btn-texto-grande"><span class="toggle-dot"></span>Texto grande</button>
          <button class="toggle-btn" id="btn-alto-contraste"><span class="toggle-dot"></span>Alto contraste</button>
        </div>
      </div>

      <section class="card-shell">
        <div class="card-shell-inner">
          <div class="section-title">
            <h2>Próximas reuniones</h2>
            <span id="count-resumen">Cargando…</span>
          </div>

          <p id="view-message" class="view-message"></p>

          <div id="assignments" class="assignments-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/1v0ZUvpB5vE0_e8QL7ZdxXJOsvr6RTrIjBZcjRjdh44E/export?format=csv&gid=96081337";

  let todasLasFilas = [];
  let mesAnioActual = null;
  let modoVista = "mes";

  function setErrorUI(msg) {
    const resumen = document.getElementById("count-resumen");
    const contenedor = document.getElementById("assignments");
    const msgVista = document.getElementById("view-message");
    if (msgVista) msgVista.textContent = "";
    resumen.textContent = "Error";
    contenedor.innerHTML = `<p class="empty-msg">${msg}</p>`;
  }

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cur = "";
    let inQuotes = false;

    const s = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      const next = s[i + 1];

      if (ch === '"' && inQuotes && next === '"') {
        cur += '"';
        i++;
        continue;
      }
      if (ch === '"') {
        inQuotes = !inQuotes;
        continue;
      }
      if (ch === "," && !inQuotes) {
        row.push(cur);
        cur = "";
        continue;
      }
      if (ch === "\n" && !inQuotes) {
        row.push(cur);
        rows.push(row);
        row = [];
        cur = "";
        continue;
      }
      cur += ch;
    }

    if (cur.length || row.length) {
      row.push(cur);
      rows.push(row);
    }
    return rows;
  }

  function normalizarTexto(str) {
    return (str || "")
      .toString()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function soloFecha(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
  }

  function esHoyDate(fecha) {
    const hoy = soloFecha(new Date());
    const f = soloFecha(fecha);
    return f.getTime() === hoy.getTime();
  }

  function obtenerMesAnioKey(date) {
    const meses = [
      "Enero","Febrero","Marzo","Abril","Mayo","Junio",
      "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
    ];
    return {
      label: meses[date.getMonth()] + " " + date.getFullYear(),
      month: date.getMonth(),
      year: date.getFullYear(),
    };
  }

  function mismoMesAnio(date, year, month) {
    return date && date.getFullYear() === year && date.getMonth() === month;
  }

  function parseFechaTexto(fechaTexto) {
    if (!fechaTexto) return null;
    const limpio = fechaTexto.toString().trim();

    const matchNum = limpio.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (matchNum) {
      const d = parseInt(matchNum[1], 10);
      const m = parseInt(matchNum[2], 10) - 1;
      let y = parseInt(matchNum[3], 10);
      if (y < 100) y += 2000;
      return new Date(y, m, d);
    }

    const limpioNorm = normalizarTexto(limpio);
    const partes = limpioNorm.split(" ").filter(Boolean);

    let dia = null;
    for (const p of partes) {
      const n = parseInt(p, 10);
      if (!isNaN(n)) { dia = n; break; }
    }
    if (dia == null) return null;

    const meses = {
      enero:0, febrero:1, marzo:2, abril:3, mayo:4, junio:5,
      julio:6, agosto:7, septiembre:8, setiembre:8, octubre:9,
      noviembre:10, diciembre:11
    };

    let mes = null;
    let year = null;

    partes.forEach((p, idx) => {
      if (meses[p] != null) mes = meses[p];
      const n = parseInt(p, 10);
      if (!isNaN(n) && idx === partes.length - 1 && n > 1900) year = n;
    });

    if (mes == null) return null;
    if (!year) year = new Date().getFullYear();

    return new Date(year, mes, dia);
  }

  function esDiaImportanteTexto(fechaTexto) {
    const limpio = normalizarTexto(fechaTexto);
    return limpio.startsWith("domingo") || limpio.startsWith("sabado") || limpio.startsWith("sábado");
  }

  function obtenerProximaReunion() {
    const hoy = soloFecha(new Date());
    return todasLasFilas.find(item => item.fecha.getTime() >= hoy.getTime()) || null;
  }

  function setMesAProximaReunion() {
    const proxima = obtenerProximaReunion();
    if (!proxima) return false;

    const kObj = obtenerMesAnioKey(proxima.fecha);
    mesAnioActual = { year: kObj.year, month: kObj.month };

    const selectMes = document.getElementById("monthYearSelect");
    if (selectMes) selectMes.value = kObj.year + "-" + kObj.month;
    return true;
  }

  function cambiarAlSiguienteMesConReuniones() {
    const selectMes = document.getElementById("monthYearSelect");
    if (!selectMes || !mesAnioActual || !todasLasFilas.length) return false;

    const hoy = soloFecha(new Date());

    const opciones = Array.from(selectMes.options)
      .map(o => {
        const [yStr, mStr] = o.value.split("-");
        return { key: o.value, year: +yStr, month: +mStr };
      })
      .sort((a, b) => (a.year - b.year) || (a.month - b.month));

    const actualKey = mesAnioActual.year + "-" + mesAnioActual.month;
    const idxActual = opciones.findIndex(o => o.key === actualKey);

    for (let i = Math.max(0, idxActual); i < opciones.length; i++) {
      const opt = opciones[i];
      const tiene = todasLasFilas.some(item =>
        mismoMesAnio(item.fecha, opt.year, opt.month) &&
        item.fecha.getTime() >= hoy.getTime()
      );
      if (tiene) {
        mesAnioActual = { year: opt.year, month: opt.month };
        selectMes.value = opt.key;
        return true;
      }
    }
    return false;
  }

  async function cargarCartelera() {
    const resumen = document.getElementById("count-resumen");
    const contenedor = document.getElementById("assignments");
    const selectMes = document.getElementById("monthYearSelect");
    resumen.textContent = "Cargando…";
    contenedor.innerHTML = "";

    try {
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) {
        setErrorUI("No se pudo cargar el CSV. Revisá permisos/publicación de la hoja.");
        return;
      }

      const text = await res.text();

      if (text.includes("<html") || text.includes("<!DOCTYPE")) {
        setErrorUI("Google devolvió una página HTML (permiso). Publicá la hoja o dejala 'Cualquiera con el enlace'.");
        return;
      }

      const data = parseCSV(text);

      if (!data || data.length < 2) {
        resumen.textContent = "0 reuniones";
        contenedor.innerHTML = "<p class='empty-msg'>Sin asignaciones cargadas.</p>";
        return;
      }

      const filas = data
        .slice(1)
        .filter((row) => row.some((cell) => cell && cell.trim() !== ""));

      const hoy = soloFecha(new Date());
      todasLasFilas = [];
      const opcionesMesSet = new Map();

      filas.forEach((row) => {
        const fechaTexto = row[0] || "";
        const fecha = parseFechaTexto(fechaTexto);
        if (!fecha) return;

        const dSolo = soloFecha(fecha);
        const keyObj = obtenerMesAnioKey(dSolo);
        const key = keyObj.year + "-" + keyObj.month;

        if (!opcionesMesSet.has(key)) opcionesMesSet.set(key, keyObj.label);

        const usaImagenes = normalizarTexto(row[8] || "") === "si";

        todasLasFilas.push({
          row,
          fecha: dSolo,
          esPasada: dSolo.getTime() < hoy.getTime(),
          usaImagenes
        });
      });

      todasLasFilas.sort((a, b) => a.fecha - b.fecha);

      const opcionesOrdenadas = Array.from(opcionesMesSet.entries())
        .map(([key, label]) => {
          const [yearStr, monthStr] = key.split("-");
          return { key, label, year: +yearStr, month: +monthStr };
        })
        .sort((a, b) => (a.year - b.year) || (a.month - b.month));

      selectMes.innerHTML = "";

      const optProxima = document.createElement("option");
      optProxima.value = "__PROXIMA__";
      optProxima.textContent = "✅ Próxima reunión";
      selectMes.appendChild(optProxima);

      opcionesOrdenadas.forEach((opt) => {
        const option = document.createElement("option");
        option.value = opt.key;
        option.textContent = opt.label;
        selectMes.appendChild(option);
      });

      selectMes.value = "__PROXIMA__";
      setMesAProximaReunion();

      selectMes.onchange = () => {
        if (selectMes.value === "__PROXIMA__") {
          setMesAProximaReunion();
          renderizar();
          return;
        }
        const [yStr, mStr] = selectMes.value.split("-");
        mesAnioActual = { year: +yStr, month: +mStr };
        renderizar();
      };

      document.querySelectorAll(".view-tab").forEach((btn) => {
        btn.onclick = () => {
          document.querySelectorAll(".view-tab").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          modoVista = btn.dataset.view || "mes";
          renderizar();
        };
      });

      const btnTexto = document.getElementById("btn-texto-grande");
      const btnAlto = document.getElementById("btn-alto-contraste");

      btnTexto.onclick = () => {
        const active = document.body.classList.toggle("modo-texto-grande");
        btnTexto.classList.toggle("active", active);
      };

      btnAlto.onclick = () => {
        const active = document.body.classList.toggle("modo-alto-contraste");
        btnAlto.classList.toggle("active", active);
      };

      renderizar();
    } catch (err) {
      console.error(err);
      setErrorUI("Se rompió el script al cargar. (Probable error de JS o CSV no accesible).");
    }
  }

  function renderizar() {
    const resumen = document.getElementById("count-resumen");
    const contenedor = document.getElementById("assignments");
    const msgVista = document.getElementById("view-message");

    contenedor.innerHTML = "";
    msgVista.textContent = "";

    if (!todasLasFilas.length || !mesAnioActual) {
      resumen.textContent = "0 reuniones";
      contenedor.innerHTML = "<p class='empty-msg'>Sin asignaciones para mostrar.</p>";
      return;
    }

    const hoy = soloFecha(new Date());

    let lista = todasLasFilas.filter(
      (item) => mismoMesAnio(item.fecha, mesAnioActual.year, mesAnioActual.month) &&
               item.fecha.getTime() >= hoy.getTime()
    );

    if (!lista.length) {
      const cambio = cambiarAlSiguienteMesConReuniones();
      if (cambio) {
        lista = todasLasFilas.filter(
          (item) => mismoMesAnio(item.fecha, mesAnioActual.year, mesAnioActual.month) &&
                   item.fecha.getTime() >= hoy.getTime()
        );
      }
    }

    if (modoVista === "hoy") {
      const hoyLista = lista.filter((item) => esHoyDate(item.fecha));
      if (hoyLista.length) {
        lista = hoyLista;
        msgVista.textContent = "Mostrando la reunión de hoy.";
      } else if (lista.length) {
        lista = [lista[0]];
        msgVista.textContent = "Hoy no hay reunión. Se muestra la próxima reunión de este mes.";
      } else {
        msgVista.textContent = "Hoy no hay reunión programada en este mes.";
      }
    } else if (modoVista === "semana") {
      const semanaFin = new Date(hoy);
      semanaFin.setDate(hoy.getDate() + 6);
      const semanaLista = lista.filter((item) => item.fecha <= semanaFin);

      if (semanaLista.length) {
        lista = semanaLista;
        msgVista.textContent = "Reuniones de esta semana.";
      } else {
        msgVista.textContent = "No hay reuniones esta semana en este mes.";
      }
    }

    if (!lista.length) {
      resumen.textContent = "0 reuniones";
      contenedor.innerHTML = "<p class='empty-msg'>Sin asignaciones futuras (ni en meses siguientes).</p>";
      return;
    }

    lista.sort((a, b) => a.fecha - b.fecha);

    resumen.textContent = lista.length === 1 ? "1 reunión asignada" : `${lista.length} reuniones asignadas`;

    let primeraFutura = true;
    let ultimoTipoDia = null;

    lista.forEach((item) => {
      const row = item.row;
      const fechaTexto = row[0] || "";
      const video = row[1] || "";
      const audio = row[2] || "";
      const mic1 = row[3] || "";
      const mic2 = row[4] || "";
      const plataforma = row[5] || "";
      const acomodadorEntrada = row[6] || "";
      const acomodadorAuditorio = row[7] || "";

      const norm = normalizarTexto(fechaTexto);
      let tipoDia = null;
      if (norm.startsWith("viernes")) tipoDia = "viernes";
      else if (norm.startsWith("domingo")) tipoDia = "domingo";

      if (tipoDia && tipoDia !== ultimoTipoDia) {
        const sep = document.createElement("div");
        sep.className = "separator";
        sep.textContent = tipoDia === "viernes" ? "Reuniones de viernes" : "Reuniones de domingo";
        contenedor.appendChild(sep);
        ultimoTipoDia = tipoDia;
      }

      const card = document.createElement("article");
      card.className = "assignment-card";

      if (primeraFutura) {
        card.classList.add("destacada");
        primeraFutura = false;
      }

      const esImportante = esDiaImportanteTexto(fechaTexto);
      const esDiaHoy = esHoyDate(item.fecha);

      const fechaDiv = document.createElement("div");
      fechaDiv.className = "assignment-date";

      const labelSpan = document.createElement("span");
      labelSpan.className = "assignment-label";
      labelSpan.textContent = card.classList.contains("destacada") ? "Próxima reunión" : "Reunión";

      const daySpan = document.createElement("span");
      daySpan.className = "assignment-day";
      if (esImportante) daySpan.classList.add("church-day");
      daySpan.textContent = fechaTexto;

      const badgesRow = document.createElement("div");
      badgesRow.className = "badge-row";

      const badgeTipo = document.createElement("div");
      badgeTipo.className = "badge";
      badgeTipo.innerHTML = `<span class="badge-dot"></span><span>${esImportante ? "Reunión principal" : "Reunión de entre semana"}</span>`;
      badgesRow.appendChild(badgeTipo);

      if (esDiaHoy) {
        const badgeHoy = document.createElement("div");
        badgeHoy.className = "badge badge-hoy";
        badgeHoy.innerHTML = `<span class="badge-dot"></span><span>HOY TE TOCA</span>`;
        badgesRow.appendChild(badgeHoy);
      }

      if (item.usaImagenes) {
        const badgeImg = document.createElement("div");
        badgeImg.className = "badge";
        badgeImg.innerHTML = `🖼️ <span>Usa imágenes</span>`;
        badgesRow.appendChild(badgeImg);
      }

      fechaDiv.appendChild(labelSpan);
      fechaDiv.appendChild(daySpan);
      fechaDiv.appendChild(badgesRow);

      const detallesDiv = document.createElement("div");
      detallesDiv.className = "assignment-details";

      function crearGrupo(label, value, extraClass) {
        const group = document.createElement("div");
        group.className = "detail-group";

        const l = document.createElement("div");
        l.className = "detail-label";
        if (extraClass) l.classList.add(extraClass);
        l.textContent = label;

        const v = document.createElement("div");
        v.className = "detail-value";
        v.textContent = value || "-";

        group.appendChild(l);
        group.appendChild(v);
        return group;
      }

      detallesDiv.appendChild(crearGrupo("Audio", audio, "label-audio"));
      detallesDiv.appendChild(crearGrupo("Video", video, "label-video"));
      detallesDiv.appendChild(crearGrupo("Mic 1", mic1, "label-mic"));
      detallesDiv.appendChild(crearGrupo("Mic 2", mic2, "label-mic"));
      detallesDiv.appendChild(crearGrupo("Plataforma", plataforma, "label-plataforma"));
      detallesDiv.appendChild(crearGrupo("Acomodador entrada", acomodadorEntrada, "label-entrada"));
      detallesDiv.appendChild(crearGrupo("Acomodador auditorio", acomodadorAuditorio, "label-auditorio"));

      card.appendChild(fechaDiv);
      card.appendChild(detallesDiv);
      contenedor.appendChild(card);
    });
  }

  window.addEventListener("DOMContentLoaded", cargarCartelera);
  </script>
</body>
</html>
